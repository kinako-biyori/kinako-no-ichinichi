<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#f6e9df">
<title>きなこの電子名刺</title>
<style>
*{box-sizing:border-box}
body{margin:0;background:linear-gradient(160deg,#f9efe8,#fffaf5);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;color:#6f5141}
.wrap{max-width:700px;margin:auto;padding:20px 16px 40px}
.card{background:#fffaf3;border:3px solid #f3b6bd;border-radius:30px;overflow:hidden;box-shadow:0 18px 45px rgba(105,70,50,.16)}
.header{padding:24px 22px 18px;background:linear-gradient(135deg,#f7d0d4,#fff8f4);border-bottom:1px dashed #e5b8ad}
.brand{font-size:13px;letter-spacing:.18em;font-weight:800;opacity:.72}
.title{font-size:30px;margin:7px 0 0;font-weight:900}
.content{display:grid;grid-template-columns:180px 1fr;gap:20px;padding:22px}
.photo{width:165px;height:165px;border-radius:50%;object-fit:cover;border:8px solid #fff;outline:4px solid #f8d6d9;box-shadow:0 12px 24px rgba(100,70,50,.14)}
.info{display:grid;gap:12px}
.row{background:#fff;border:1px solid #eed8ce;border-radius:16px;padding:11px 13px}
.label{font-size:11px;font-weight:800;letter-spacing:.12em;color:#a77f70;margin-bottom:3px}
.value{font-size:18px;font-weight:850}
.color-line{display:flex;align-items:center;gap:12px}
.choice{display:flex;align-items:center;gap:6px;font-weight:800}
.dot{width:22px;height:22px;border-radius:50%;border:2px solid #a68a7a;display:inline-block;position:relative}
.dot.gold{background:linear-gradient(135deg,#f1ce62,#bd8c20)}
.dot.silver{background:linear-gradient(135deg,#e9ecef,#9ca3aa)}
.selected .dot::after{content:"";position:absolute;inset:-7px;border:3px solid #df6e79;border-radius:50%}
.sns{margin:0 22px 22px;background:#fff;border:1px solid #eed8ce;border-radius:20px;padding:16px}
.sns h2{font-size:17px;margin:0 0 8px}
.link,.copy{display:flex;justify-content:space-between;align-items:center;width:100%;gap:12px;text-decoration:none;color:#6f5141;background:#fff7f2;border:1px solid #f0d7ce;border-radius:14px;padding:12px 14px;margin-top:8px;font-weight:800}
.badge{font-size:12px;background:#f2c9cf;padding:5px 8px;border-radius:999px}
.message{margin:0 22px 22px;padding:18px;text-align:center;background:linear-gradient(135deg,#fff4f4,#fffaf0);border:1px dashed #e4aaa5;border-radius:20px;font-weight:850}
.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 22px 22px}
.button,button{border:0;border-radius:16px;padding:14px 12px;font-size:15px;font-weight:850;text-align:center;text-decoration:none;cursor:pointer}
.primary{background:#d97783;color:#fff} .secondary{background:#f3e3db;color:#6f5141}
.note{text-align:center;font-size:12px;opacity:.66;margin-top:14px}
.toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(20px);background:#5f493b;color:#fff;padding:12px 16px;border-radius:999px;opacity:0;transition:.25s;font-weight:800}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-width:560px){.content{grid-template-columns:1fr}.photo{display:block;margin:auto;width:150px;height:150px}.actions{grid-template-columns:1fr}}
</style>
</head>
