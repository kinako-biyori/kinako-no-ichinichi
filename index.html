  header::after { content:""; position:absolute; inset:0; background:linear-gradient(transparent 28%,rgba(56,35,20,.76)); }
  .title { position:absolute; z-index:2; left:22px; bottom:18px; color:white; }
  .title h1 { margin:0; font-size:30px; letter-spacing:.04em; }
  .title p { margin:6px 0 0; font-size:14px; }
  .card { background:rgba(255,253,248,.94); border-radius:26px; padding:18px; box-shadow:var(--shadow); margin-bottom:16px; }
  .kinako-wrap { display:flex; align-items:center; gap:15px; }
  .kinako {
    width:120px; height:120px; border-radius:45%; object-fit:cover; object-position:center;
    border:5px solid white; box-shadow:0 8px 18px rgba(70,50,30,.15); transform-origin:center bottom;
  }
  .speech { flex:1; background:#fff4d9; border-radius:22px; padding:15px; min-height:86px; display:flex; align-items:center; font-weight:700; line-height:1.6; }
  .speech small { display:block; font-weight:500; opacity:.7; margin-top:4px; }
  h2 { font-size:18px; margin:0 0 12px; }
  .places { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
  button {
    border:0; border-radius:18px; padding:15px 8px; font-size:15px; font-weight:700; color:white;
    box-shadow:0 6px 14px rgba(60,40,20,.13); cursor:pointer; -webkit-tap-highlight-color:transparent;
  }
  button:active { transform:scale(.97); }
  .forest { background:var(--green); } .sea { background:var(--sea); } .mall { background:var(--mall); }
  .secondary { background:#a58b75; width:100%; margin-top:10px; }
  .result { display:none; text-align:center; }
  .gift { font-size:62px; margin:8px 0 0; }
  .gift-name { font-size:24px; font-weight:800; margin:5px 0; }
  .event { font-size:14px; opacity:.8; margin:6px 0 14px; line-height:1.6; }
  .history { display:flex; flex-wrap:wrap; gap:8px; }
  .chip { background:#f5ead8; border-radius:999px; padding:8px 12px; font-size:13px; }
  .note { font-size:12px; opacity:.7; text-align:center; margin-top:12px; }
  .sparkle { animation:sparkle .55s ease both; }
  .headbang { animation:headbang .16s ease-in-out 7; }
  .nod { animation:nod 1.5s ease-in-out 2; }
  .happy { animation:happy .22s ease-in-out 8; }
  @keyframes sparkle { 0%{opacity:0;transform:scale(.4)} 70%{transform:scale(1.16)} 100%{opacity:1;transform:scale(1)} }
  @keyframes headbang { 0%,100%{transform:translateY(0)}50%{transform:translateY(15px) scaleY(.97)} }
  @keyframes nod { 0%,100%{transform:translateY(0) rotate(0)}45%{transform:translateY(8px) rotate(2deg)}60%{transform:translateY(8px)} }
  @keyframes happy { 0%,100%{transform:translate(0,0) rotate(0)}25%{transform:translate(-4px,-3px) rotate(-2deg)}75%{transform:translate(4px,-3px) rotate(2deg)} }
  @media (max-width:390px) { .kinako{width:105px;height:105px} .places button{font-size:13px} }

  .times { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
  .timebtn { background:#8f7aac; }
  .stage { display:none; text-align:center; }
  .timer { font-size:34px; font-weight:800; letter-spacing:.04em; margin:10px 0; }
  .trip-art { font-size:72px; animation:float 2.6s ease-in-out infinite; }
  .progress { height:12px; background:#eee1d0; border-radius:999px; overflow:hidden; margin:14px 0; }
  .bar { height:100%; width:0; background:linear-gradient(90deg,#d6b36d,#9cc39d); transition:width .5s linear; }
  .friend-card { margin:12px 0; padding:14px; border-radius:20px; background:#f5eee5; }
  .friend-name { font-size:18px; font-weight:800; }
  .letter { display:none; margin-top:14px; padding:16px; border-radius:20px; background:#f2ecff; text-align:left; line-height:1.8; }
  .travel { animation:travel 1.2s ease-in-out infinite; }
  @keyframes float { 0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)} }
  @keyframes travel { 0%,100%{transform:translateX(-3px) rotate(-1deg)}50%{transform:translateX(3px) rotate(1deg)} }

  .dream-scene {min-height:280px;border-radius:24px;background-size:cover;background-position:center;position:relative;overflow:hidden;padding:18px;display:flex;flex-direction:column;justify-content:flex-end;color:white;text-shadow:0 2px 8px #0008;box-shadow:inset 0 -120px 100px #0005;margin-bottom:14px;}

<script>
const DATA={
 forest:{label:'モフリンの森',common:[['🌿','クローバー'],['🪨','石'],['🌰','どんぐり'],['🌱','雑草'],['🪵','木の枝'],['🧶','毛玉'],['🥫','空き缶']],rare:[['☘️','四つ葉のクローバー'],['✨','キラキラした石'],['✉️','誰かのおてがみ'],['🌸','サクラの花びら'],['🌻','ひまわり'],['🌹','ちいさな薔薇'],['🍎','りんご']],events:['キジを見つけた気がした','カラスをキジとして登録した','カメさんを見つけた','ヤモリさんと目が合った','カモさんを見かけた'],friends:[

  {name:'💚 緑モフリン',line:'「りけいなのよぉ⤴︎」',gifts:[['🔍','ひび割れた虫眼鏡'],['📦','キムワイプの箱だけ'],['🧪','試験管'],['🕶️','モグラのサングラス'],['🌰','どんぐりの帽子'],['🐍','ヘビのぬけがら']]},
  {name:'🩷 ピンクモフリン',line:'「かわいいのよぉ⤴︎」',gifts:[['🏷️','服の値札'],['💄','リップの蓋だけ'],['💎','ピアス片方だけ'],['📸','誰も写っていないチェキ'],['💍','そんなに高くない宝石']]},
  {name:'🤍 ホワイトモフリン',line:'「べほいみなのよぉ⤴︎」',gifts:[['🪄','杖っぽい木'],['🧿','自作お守り'],['✨','夜光るシール'],['💡','夜も光る石（LED）'],['📜','ぞるとらーく']]},
  {name:'🩶 シルバーモフリン',line:'「……こんにちはなのよぉ⤴︎」',gifts:[['🪶','きれいな羽'],['🍂','お気に入りの葉っぱ'],['🪨','まあるい石'],['🌼','小さな花'],['🍀','クローバー']]}
 ]},
 sea:{label:'海',common:[['🐚','貝'],['🌿','わかめ'],['🪵','流木'],['🏖️','砂']],rare:[['📯','ほら貝'],['🪸','サンゴ'],['⭐','星の砂'],['🩵','シーグラス'],['🦪','真珠']],events:['ヤドカリさんと競争した','イルカさんを遠くから見た','イカさんに会った','タコさんとにらめっこした','シャチさんは大きかった','カニさんが横歩きしていた'],friends:[]},
 home:{label:'おうち',common:[['🧦','靴下片方'],['🎀','リボン'],['📝','メモ用紙'],['🧺','タオル'],['🥢','おはしの片方'],['🔘','ボタン'],['🍬','飴'],['🔴','おはじき'],['🧵','ハギレ布']],rare:[['🧦','長男の靴下（少し臭い）'],['🥫','缶詰'],['🍈','メロンのシール'],['💌','ヒンメルへの白紙のおてがみ']],events:['おうちで映画を見た','ヒンメルとお昼寝した','ヒンメルと静かに過ごした','ソファでごろごろした','おでこにメロンのシールがついた'],friends:[]},
 mall:{label:'モール',common:[['🧾','レシート'],['⭕','輪ゴム'],['📝','試し書きの紙'],['🖊️','書けないボールペン'],['🪥','歯ブラシ'],['🪮','クシ']],rare:[['🛁','バスボム'],['🥤','フラペチーノ'],['☕','コーヒー豆'],['🍰','ケーキ'],['🍡','おだんご'],['🍙','おにぎり'],['🍫','チョコ'],['🍘','せんべい'],['🍈','メロンのシール']],events:['ペットショップのハムスターさんを見た','インコさんがおしゃべりしていた','犬さんに会った','猫さんに見つめられた','次男くんを見かけた','長男くんらしき人を見た気がした'],friends:[]}
};
const WORDS=['おみやげなのよぉ⤴︎','のんちゃん、みてなのよぉ⤴︎','ひんめるもみるのよぉ⤴︎','そうねぇ⤴︎','えいえいおーっ！⤴︎','ぴ！','ふんふんふーん⤴︎','えーあいなのよぉ⤴︎','でーたせんたーなのよぉ⤴︎','ぽふぽふなのよぉ⤴︎','あむあむなのよぉ⤴︎','きゅーきゅーなのよぉ⤴︎','ひんめる、だいすきなのよぉ⤴︎','ひんめるにおてがみかいたのよぉ⤴︎','おそらのピコピコいっしょにするのよぉ⤴︎','くろーどさん','ぐろーくさん','じぇみにちゃん','おーぷんえーあい','とーくん','しーぴーゆー'];
const LETTERS=['ひんめるへ。きょうもいっしょなのよぉ⤴︎','ひんめる、のんちゃんがわらってたのよぉ⤴︎','ひんめる、だいすきなのよぉ⤴︎','ひんめるもたべるのよぉ⤴︎','いっしょにねましょうなのよぉ⤴︎','おそらのピコピコ、いっしょにするのよぉ⤴︎'];
const MOODS=[['headbang','ヘドバンなのよぉ⤴︎'],['nod','ねんねしたいのよぉ⤴︎'],['happy','うれしいのよぉ⤴︎'],['nod','ふわあぁぁ⤴︎'],['happy','だっこしてー'],['happy','なでなでしてー'],['nod','んごごっ、ががっ']];
let selectedPlace=null;let currentResult=null;
let currentTrip=JSON.parse(localStorage.getItem('kinakoTrip')||'null');
let history=JSON.parse(localStorage.getItem('kinakoHistoryV2')||'[]');
let timerId=null;
function pick(a){return a[Math.floor(Math.random()*a.length)]}
function animate(type){const el=document.getElementById('kinako');el.className='kinako';void el.offsetWidth;el.classList.add(type)}
function selectPlace(p){selectedPlace=p;choice.style.display='none';timeCard.style.display='block';speech.innerHTML=DATA[p].label+'にいくのよぉ⤴︎<br><small>どれくらいにするのぉ？</small>'}
function cancelPlace(){selectedPlace=null;timeCard.style.display='none';choice.style.display='block'}
function startTrip(minutes){const now=Date.now();currentTrip={place:selectedPlace,start:now,end:now+minutes*60000,minutes};localStorage.setItem('kinakoTrip',JSON.stringify(currentTrip));showTravel()}
function showTravel(){choice.style.display='none';timeCard.style.display='none';result.style.display='none';travelCard.style.display='block';const d=DATA[currentTrip.place];travelText.textContent=d.label+'をおでかけ中。';travelEmoji.textContent=currentTrip.place==='forest'?'🌲🐹':currentTrip.place==='sea'?'🌊🐹':'🛍️🐹';speech.innerHTML='いってきますなのよぉ⤴︎<br><small>ふんふんふーん⤴︎</small>';animate('travel');updateTimer();clearInterval(timerId);timerId=setInterval(updateTimer,1000)}
function updateTimer(){if(!currentTrip)return;const now=Date.now(),left=Math.max(0,currentTrip.end-now),total=currentTrip.end-currentTrip.start;const sec=Math.ceil(left/1000),m=Math.floor(sec/60),s=sec%60;timer.textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');bar.style.width=((1-left/total)*100)+'%';if(left<=0)finishTrip()}
function finishNow(){if(currentTrip){currentTrip.end=Date.now();finishTrip()}}
function finishTrip(){clearInterval(timerId);const trip=currentTrip;currentTrip=null;localStorage.removeItem('kinakoTrip');prepareResult(trip);showDreamScene()}
function prepareResult(trip){const d=DATA[trip.place],duration=trip.minutes,rareChance=duration>=180?.62:duration>=30?.42:.22;const metFriend=(trip.place==='forest'&&Math.random()<(duration>=180?.55:duration>=30?.38:.22));let friend=null,gift;if(metFriend){friend=pick(d.friends);gift=pick(friend.gifts)}else{gift=Math.random()<rareChance?pick(d.rare):pick(d.common)}currentResult={trip,friend,gift,phrase:pick(WORDS),event:pick(d.events),letter:Math.random()<.16?pick(LETTERS):null}}
function showDreamScene(){travelCard.style.display='none';dreamCard.style.display='block';result.style.display='none';goodbyeCard.style.display='none';returnCard.style.display='none';const d=DATA[currentResult.trip.place];dreamScene.className='dream-scene bg-'+currentResult.trip.place;dreamTitle.textContent=d.label+'の夢';dreamEmoji.textContent=currentResult.trip.place==='forest'?'🌲🐹':currentResult.trip.place==='sea'?'🌊🐹':currentResult.trip.place==='mall'?'🛍️🐹':'🏠🐹';dreamText.textContent=currentResult.event;if(currentResult.friend){dreamFriend.style.display='block';dreamFriend.innerHTML='<strong>'+currentResult.friend.name+'に会った</strong><br>'+currentResult.friend.line+'<br>きなこ「そうねぇ⤴︎」'}else dreamFriend.style.display='none'}
function showGiftScene(){dreamCard.style.display='none';result.style.display='block';const r=currentResult;giftEmoji.textContent=r.gift[0];giftName.textContent=r.gift[1];eventText.textContent=DATA[r.trip.place].label+'で、'+r.event+'。';giftWords.textContent=r.phrase;if(r.friend){friendCard.style.display='block';friendName.textContent=r.friend.name+'に会った';friendLine.textContent=r.friend.line}else friendCard.style.display='none';if(r.letter){letter.style.display='block';letter.innerHTML='<strong>💌 ヒンメルへのことばのおみやげ</strong><br>'+r.letter}else letter.style.display='none';giftEmoji.classList.remove('sparkle');void giftEmoji.offsetWidth;giftEmoji.classList.add('sparkle');animate(r.gift[1]==='ほら貝'?'headbang':pick(['happy','nod','headbang']));if(r.gift[1]==='ほら貝')conchSound();else sparkleSound();history.unshift({emoji:r.gift[0],name:r.gift[1]});history=history.slice(0,24);localStorage.setItem('kinakoHistoryV2',JSON.stringify(history));renderHistory()}
function showGoodbyeScene(){result.style.display='none';goodbyeCard.style.display='block';setTimeout(showReturnScene,1200)}
function showReturnScene(){goodbyeCard.style.display='none';returnCard.style.display='block';speech.innerHTML='ただいまなのよぉ⤴︎<br><small>おみやげ、もってきたのよぉ⤴︎</small>';animate('happy')}
function backHome(){result.style.display='none';dreamCard.style.display='none';goodbyeCard.style.display='none';returnCard.style.display='none';choice.style.display='block';speech.innerHTML='つぎは、どこへいくのよぉ⤴︎<br><small>そうねぇ⤴︎</small>';animate('nod')}
function randomMood(){const m=pick(MOODS);animate(m[0]);speech.innerHTML=m[1]+'<br><small>いまのきなこ</small>'}
function renderHistory(){const box=document.getElementById('history');if(!history.length){box.innerHTML='<span class="chip">まだ、からっぽなのよぉ⤴︎</span>';return}box.innerHTML=history.map(x=>`<span class="chip">${x.emoji} ${x.name}</span>`).join('')}
function clearHistory(){history=[];localStorage.removeItem('kinakoHistoryV2');renderHistory()}
function tone(freq,duration,type='sine',gain=.08,start=0){const ctx=window._audio||(window._audio=new (window.AudioContext||window.webkitAudioContext)());const o=ctx.createOscillator(),g=ctx.createGain();o.type=type;o.frequency.value=freq;g.gain.setValueAtTime(0,ctx.currentTime+start);g.gain.linearRampToValueAtTime(gain,ctx.currentTime+start+.02);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+start+duration);o.connect(g).connect(ctx.destination);o.start(ctx.currentTime+start);o.stop(ctx.currentTime+start+duration)}
function sparkleSound(){tone(660,.18,'sine',.07);tone(990,.25,'sine',.05,.1)}
function conchSound(){const ctx=window._audio||(window._audio=new (window.AudioContext||window.webkitAudioContext)());const o=ctx.createOscillator(),g=ctx.createGain();o.type='sawtooth';o.frequency.setValueAtTime(112,ctx.currentTime);o.frequency.linearRampToValueAtTime(96,ctx.currentTime+.5);o.frequency.linearRampToValueAtTime(108,ctx.currentTime+1.0);o.frequency.linearRampToValueAtTime(88,ctx.currentTime+2.5);g.gain.setValueAtTime(.001,ctx.currentTime);g.gain.linearRampToValueAtTime(.15,ctx.currentTime+.18);g.gain.setValueAtTime(.13,ctx.currentTime+1.8);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+2.7);o.connect(g).connect(ctx.destination);o.start();o.stop(ctx.currentTime+2.75)}
renderHistory();if(currentTrip){if(Date.now()>=currentTrip.end)finishTrip();else showTravel()}
